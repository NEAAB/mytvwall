<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TL ENGINEERING - REALTIME DASHBOARD</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ff6600; --text: #f8fafc; }
        ::-webkit-scrollbar { display: none; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }
        #header { 
            background: #ffffff; text-align: center; padding: 10px 0; 
            border-bottom: 5px solid #ff6600; z-index: 1000; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        #logo { max-height: 90px; width: auto; }
        #wall-container {
            flex-grow: 1; overflow-y: scroll; padding: 20px 40px;
            display: flex; flex-direction: column; gap: 30px;
        }
        .card { 
            background: var(--card); padding: 30px; border-radius: 25px; 
            border-left: 15px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out; flex-shrink: 0;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .user { color: var(--accent); font-size: 1.8rem; font-weight: bold; }
        .time { color: #94a3b8; font-size: 1.2rem; }
        .text { font-size: 2.4rem; line-height: 1.4; word-wrap: break-word; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    
    <div id="header">
        <img src="logo.png" id="logo" alt="logo">
    </div>

    <div id="wall-container"></div>

    <script>
        const socket = io("http://localhost:3000");
        const wall = document.getElementById('wall-container');
        let currentScroll = 0;
        let isPaused = false;

        // รับข้อมูลจาก Node.js Server
        socket.on("new_message", (data) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="user">${data.sender}</div>
                    <div class="time">${data.date}</div>
                </div>
                <div class="text">${data.text}</div>
            `;
            wall.appendChild(card);
            
            // เมื่อมีข้อความใหม่ ให้เลื่อนลงไปดูทันที
            scrollToBottom();
        });

        // ระบบเลื่อนอัตโนมัติ (Smooth Scroll)
        function autoScroll() {
            if (!isPaused && wall.scrollHeight > wall.clientHeight) {
                currentScroll += 0.5;
                wall.scrollTop = currentScroll;
                if (currentScroll + wall.clientHeight >= wall.scrollHeight) {
                    isPaused = true;
                    setTimeout(() => { 
                        wall.scrollTo({ top: 0, behavior: 'smooth' });
                        currentScroll = 0;
                        isPaused = false;
                    }, 5000);
                }
            }
            requestAnimationFrame(autoScroll);
        }

        function scrollToBottom() {
            wall.scrollTo({ top: wall.scrollHeight, behavior: 'smooth' });
            currentScroll = wall.scrollHeight;
        }

        requestAnimationFrame(autoScroll);
        wall.addEventListener('mouseenter', () => isPaused = true);
        wall.addEventListener('mouseleave', () => isPaused = false);
    </script>
</body>
</html>
