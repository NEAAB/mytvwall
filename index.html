<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TL ENGINEERING</title>
    <style>
        :root { --bg: #ebecf0; --card: #1e293b; --accent: #ff6600; --text: #f8fafc; }
        ::-webkit-scrollbar { display: none; }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        #header { 
            background: var(--bg); text-align: center; padding: 15px 0; 
            border-bottom: 3px solid var(--accent); z-index: 1000; flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        #logo { max-height: 90px; width: auto; }

        #wall-container {
            flex-grow: 1; overflow-y: scroll; padding: 20px 40px;
            display: flex; flex-direction: column; gap: 30px;
            scroll-behavior: auto; /* ปิด smooth default เพื่อใช้ JS คุมเองให้นุ่มกว่า */
        }

        .card { 
            background: var(--card); padding: 30px; border-radius: 25px; 
            border-left: 15px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1); flex-shrink: 0;
        }

        .user { color: var(--accent); font-size: 1.8rem; font-weight: bold; margin-bottom: 12px; }
        .text { font-size: 2.4rem; line-height: 1.4; margin-bottom: 10px; }
        .media { width: 100%; max-height: 550px; object-fit: contain; border-radius: 15px; margin-top: 20px; background: #000; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95) translateY(20px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
    </style>
</head>
<body>
    
    <div id="header">
        <img src="logo.png" id="logo" alt="TL Logo">
    </div>

    <div id="wall-container"></div>

    <script>
        const BOT_TOKEN = '8727039624:AAHt67gPcKlMOPKbmu-WoX9eHK7NRuMa2ZQ'; 
        const TARGET_CHAT_ID = '-5038324827'; 
        
        let lastUpdateId = 0;
        let displayedMessageIds = new Set();
        const wall = document.getElementById('wall-container');

        // --- ระบบ Ultra Smooth Auto Scroll ---
        let currentScroll = 0;
        let scrollSpeed = 0.6; // ความเร็วในการเลื่อน (ปรับได้ตามใจชอบ)
        let isPaused = false;

        function smoothScroll() {
            if (!isPaused && wall.scrollHeight > wall.clientHeight) {
                currentScroll += scrollSpeed;
                wall.scrollTop = currentScroll;

                // เมื่อถึงล่างสุด
                if (currentScroll + wall.clientHeight >= wall.scrollHeight) {
                    isPaused = true;
                    setTimeout(() => {
                        resetToTopSmoothly();
                    }, 4000); // หยุดรอที่ข้างล่าง 4 วินาที
                }
            }
            requestAnimationFrame(smoothScroll);
        }

        // ฟังก์ชันค่อยๆ เลื่อนกลับไปบนสุดแบบนุ่มนวล
        function resetToTopSmoothly() {
            const start = wall.scrollTop;
            const duration = 2000; // ใช้เวลา 2 วินาทีในการเลื่อนกลับ
            let startTime = null;

            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const run = easeInOutQuad(timeElapsed, start, -start, duration);
                wall.scrollTop = run;
                currentScroll = run;
                if (timeElapsed < duration) {
                    requestAnimationFrame(animation);
                } else {
                    isPaused = false;
                }
            }

            function easeInOutQuad(t, b, c, d) {
                t /= d/2;
                if (t < 1) return c/2*t*t + b;
                t--;
                return -c/2 * (t*(t-2) - 1) + b;
            }
            requestAnimationFrame(animation);
        }

        requestAnimationFrame(smoothScroll);

        // หยุดเมื่อเมาส์ชี้
        wall.addEventListener('mouseenter', () => isPaused = true);
        wall.addEventListener('mouseleave', () => isPaused = false);

        async function fetchTelegram(isInitial = false) {
            try {
                const offsetParam = isInitial ? -10 : lastUpdateId + 1;
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${offsetParam}&timeout=30`);
                const data = await response.json();

                if (data.ok && data.result.length > 0) {
                    const filteredMessages = data.result.filter(update => 
                        update.message && update.message.chat.id == TARGET_CHAT_ID
                    );

                    for (let update of filteredMessages) {
                        lastUpdateId = update.update_id;
                        const msgId = update.message.message_id;

                        if (!displayedMessageIds.has(msgId)) {
                            displayedMessageIds.add(msgId);
                            processMessage(update.message);
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function processMessage(msg) {
            const card = document.createElement('div');
            card.className = 'card';
            let content = `<div class="user">@${msg.from.first_name || 'User'}</div>`;
            
            if (msg.location) {
                const mapUrl = `https://static-maps.yandex.ru/1.x/?lang=en_US&ll=${msg.location.longitude},${msg.location.latitude}&z=16&l=map&size=600,450&pt=${msg.location.longitude},${msg.location.latitude},pm2rdm`;
                content += `<div class="text">📍 แชร์ตำแหน่งที่ตั้ง</div><img src="${mapUrl}" class="media">`;
            } 
            else if (msg.photo) {
                const fileId = msg.photo[msg.photo.length - 1].file_id;
                const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                const fileData = await fileRes.json();
                const imgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                content += `<img src="${imgUrl}" class="media">`;
                if (msg.caption) content += `<div class="text">${msg.caption}</div>`;
            } 
            else if (msg.text) {
                content += `<div class="text">${msg.text}</div>`;
            }

            card.innerHTML = content;
            wall.prepend(card);
            
            // เมื่อมีข้อความใหม่ ให้ค่อยๆ สไลด์กลับไปดูบนสุด
            if (currentScroll > 100) {
                isPaused = true;
                resetToTopSmoothly();
            }
        }

        fetchTelegram(true); 
        setInterval(() => fetchTelegram(false), 3000);
    </script>
</body>
</html>
