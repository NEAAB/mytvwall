<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TL ENGINEERING</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ff6600; --text: #f8fafc; }
        
        /* ปรับแต่ง Scrollbar ให้ดูสวยงาม (สำหรับ Browser ที่รองรับ) */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card); border-radius: 10px; border: 2px solid var(--accent); }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; 
        }

        #header { 
            background: var(--bg); text-align: center; padding: 15px 0; 
            border-bottom: 3px solid var(--accent); z-index: 1000; flex-shrink: 0;
            position: sticky; top: 0;
        }

        #logo { max-height: 90px; width: auto; }

        /* ส่วนแสดงข้อความที่เลื่อนดูได้ */
        #wall-container {
            flex-grow: 1; 
            overflow-y: auto; /* เปิดให้ Scroll ได้ */
            padding: 20px;
            display: flex;
            flex-direction: column; /* เรียงจากบนลงล่างตามปกติ */
            gap: 20px;
            scroll-behavior: smooth;
        }

        .card { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            border-left: 12px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.5s ease-out; flex-shrink: 0;
        }

        .user { color: var(--accent); font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .text { font-size: 2.2rem; line-height: 1.3; margin-bottom: 10px; }
        .media { 
            width: 100%; max-height: 550px; object-fit: contain; 
            border-radius: 12px; margin-top: 15px; background: #000; 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-30px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
    </style>
</head>
<body>
    
    <div id="header">
        <img src="logo.png" id="logo" alt="TL Logo">
    </div>

    <div id="wall-container"></div>

    <script>
        const BOT_TOKEN = '8727039624:AAHt67gPcKlMOPKbmu-WoX9eHK7NRuMa2ZQ'; 
        const TARGET_CHAT_ID = '-5038324827'; 
        
        let lastUpdateId = 0;
        let displayedMessageIds = new Set();

        async function fetchTelegram() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`);
                const data = await response.json();
                if (data.ok && data.result.length > 0) {
                    // เรียงจากเก่าไปใหม่เพื่อให้ข้อความใหม่ไปอยู่บนสุด
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.chat.id == TARGET_CHAT_ID) {
                            const msgId = update.message.message_id;
                            if (!displayedMessageIds.has(msgId)) {
                                displayedMessageIds.add(msgId);
                                processMessage(update.message);
                                if (displayedMessageIds.size > 200) { // เพิ่มการจำ ID เป็น 200
                                    const firstItem = displayedMessageIds.values().next().value;
                                    displayedMessageIds.delete(firstItem);
                                }
                            }
                        }
                    }
                }
            } catch (e) { console.error("Error fetching:", e); }
        }

        async function processMessage(msg) {
            const wall = document.getElementById('wall-container');
            const card = document.createElement('div');
            card.className = 'card';
            
            let content = `<div class="user">@${msg.from.first_name || 'User'}</div>`;
            
            if (msg.location) {
                const mapUrl = `https://static-maps.yandex.ru/1.x/?lang=en_US&ll=${msg.location.longitude},${msg.location.latitude}&z=16&l=map&size=600,450&pt=${msg.location.longitude},${msg.location.latitude},pm2rdm`;
                content += `<div class="text">📍 แชร์ตำแหน่งที่ตั้ง</div><img src="${mapUrl}" class="media">`;
            } 
            else if (msg.photo) {
                const fileId = msg.photo[msg.photo.length - 1].file_id;
                const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                const fileData = await fileRes.json();
                const imgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                content += `<img src="${imgUrl}" class="media">`;
                if (msg.caption) content += `<div class="text">${msg.caption}</div>`;
            } 
            else if (msg.text) {
                content += `<div class="text">${msg.text}</div>`;
            }

            card.innerHTML = content;
            
            // ใช้ prepend เพื่อให้ข้อความใหม่ล่าสุดอยู่ "บนสุด" เสมอ
            wall.prepend(card);

            // เมื่อมีข้อความใหม่เข้ามา ให้หน้าจอเลื่อนไปบนสุดอัตโนมัติ (ถ้าไม่ได้กำลังเลื่อนดูของเก่าอยู่)
            if (wall.scrollTop < 100) {
                wall.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        fetchTelegram(); 
        setInterval(fetchTelegram, 3000);
    </script>
</body>
</html>
