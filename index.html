<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TL ENGINEERING</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ff6600; --text: #f8fafc; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; /* จัดวางแบบบนลงล่าง */
            overflow: hidden; 
        }
        
        /* ล็อกส่วนหัวไว้ ไม่ให้ขยับ */
        #header { 
            background: var(--bg);
            text-align: center; 
            padding: 20px 0; 
            border-bottom: 3px solid var(--accent);
            z-index: 100; /* ให้อยู่ชั้นบนสุดเสมอ */
            flex-shrink: 0; /* ป้องกันไม่ให้ส่วนหัวโดนบีบ */
        }
        
        #logo { 
            max-height: 120px; /* ปรับขนาดโลโก้ให้เด่นชัด */
            width: auto; 
        }
        
        /* พื้นที่แสดงข้อความ ให้เลื่อนขึ้นลงได้ภายในเขตนี้ */
        #wall-container {
            flex-grow: 1; /* กินพื้นที่ที่เหลือทั้งหมด */
            overflow-y: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column-reverse; /* ข้อความใหม่เริ่มจากด้านบนลงมา */
            gap: 20px;
        }

        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            border-left: 10px solid var(--accent); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.5s ease-out;
            flex-shrink: 0;
        }

        .user { color: var(--accent); font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .text { font-size: 2.2rem; line-height: 1.3; }
        .media { width: 100%; max-height: 300px; object-fit: contain; border-radius: 10px; margin-top: 10px; }
        
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(-30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>
    
    <div id="header">
        <img src="logo.png" id="logo" alt="logo">
    </div>

    <div id="wall-container" id="wall">
        </div>

    <script>
        const BOT_TOKEN = '8727039624:AAHt67gPcKlMOPKbmu-WoX9eHK7NRuMa2ZQ'; 
        const TARGET_CHAT_ID = '-5038324827'; 
        
        let lastUpdateId = 0;

        async function fetchTelegram() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`);
                const data = await response.json();
                if (data.ok) {
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.message && update.message.chat.id == TARGET_CHAT_ID) {
                            processMessage(update.message);
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function processMessage(msg) {
            const wall = document.getElementById('wall-container');
            const card = document.createElement('div');
            card.className = 'card';
            
            let content = `<div class="user">@${msg.from.first_name || 'User'}</div>`;
            
            if (msg.location) {
                const mapUrl = `https://static-maps.yandex.ru/1.x/?lang=en_US&ll=${msg.location.longitude},${msg.location.latitude}&z=16&l=map&size=600,300&pt=${msg.location.longitude},${msg.location.latitude},pm2rdm`;
                content += `<div class="text">📍 แชร์ตำแหน่งที่ตั้ง</div><img src="${mapUrl}" class="media">`;
            } 
            else if (msg.photo) {
                const fileId = msg.photo[msg.photo.length - 1].file_id;
                const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                const fileData = await fileRes.json();
                const imgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                content += `<img src="${imgUrl}" class="media">`;
                if (msg.caption) content += `<div class="text">${msg.caption}</div>`;
            } 
            else if (msg.text) {
                content += `<div class="text">${msg.text}</div>`;
            }

            card.innerHTML = content;
            wall.prepend(card);

            // จำกัดข้อความบนจอไม่ให้เกิน 3-4 อัน เพื่อไม่ให้เบียดกันเกินไป
            if (wall.children.length > 4) wall.removeChild(wall.lastChild);
        }

        setInterval(fetchTelegram, 3000);
    </script>
</body>
</html>
